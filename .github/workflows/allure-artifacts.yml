name: Allure Reports (Simple History)

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # -----------------------
      # Run tests
      # -----------------------
      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npx playwright test --project="chromium"

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      # -----------------------
      # Download previous bundle
      # -----------------------
      - name: Download previous reports bundle
        uses: actions/download-artifact@v4
        with:
          name: reports-bundle
          path: site
        continue-on-error: true

      # -----------------------
      # Add current report
      # -----------------------
      - name: Add current report
        run: |
          mkdir -p site
          cp -r allure-report site/run-${{ github.run_number }}

      # -----------------------
      # Keep only last 10 reports
      # -----------------------
      - name: Cleanup old reports
        run: |
          cd site
          ls -dt run-* | tail -n +11 | xargs rm -rf || true

      # -----------------------
      # Create index page
      # -----------------------
      - name: Generate index
        run: |
          echo "<h1>Allure Reports</h1><ul>" > site/index.html
          for d in site/run-*; do
            NAME=$(basename $d)
            echo "<li><a href=\"$NAME/index.html\">$NAME</a></li>" >> site/index.html
          done
          echo "</ul>" >> site/index.html

      # -----------------------
      # Upload bundle (for next run)
      # -----------------------
      - name: Upload reports bundle
        uses: actions/upload-artifact@v4
        with:
          name: reports-bundle
          path: site

      # -----------------------
      # Deploy to Pages
      # -----------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4

      # -----------------------
      # PR Comment
      # -----------------------
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/run-${context.runNumber}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 Allure Report: ${url}`
            });
