name: Playwright + Allure + TestOps

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      pull-requests: write

    steps:
      # -----------------------
      # Checkout repos
      # -----------------------
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Checkout automation repo
        uses: actions/checkout@v4
        with:
          repository: kashifa-mansoor/sample-repo
          ref: main
          token: ${{ secrets.SAMPLE_REPO_TOKEN }}
          path: automation

      # -----------------------
      # Setup Node
      # -----------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd automation
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd automation
          npx playwright install chromium

      - name: Install and configure allurectl
        uses: allure-framework/setup-allurectl@v1.0.2
        with:
          allure-endpoint: ${{ secrets.ALLURE_ENDPOINT }}
          allure-project-id: 1
          allure-token: ${{ secrets.ALLURE_TOKEN }}

      # -----------------------
      # Run tests
      # (Playwright config already generates HTML + allure-results)
      # -----------------------
      - name: Run tests
        run: |
          cd automation
          allurectl watch -- npx playwright test --project="chromium"

      # -----------------------
      # Install Allure CLI
      # -----------------------
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # -----------------------
      # Generate Allure HTML report (IMPORTANT)
      # -----------------------
      - name: Generate Allure report
        if: always()
        run: |
          cd automation
          npx allure generate allure-results --clean -o allure-report

      # -----------------------
      # Upload Artifacts (history stored here)
      # -----------------------
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ github.run_number }}
          path: automation/playwright-report
          retention-days: 14

      # - name: Upload Allure results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: allure-results-${{ github.run_number }}
      #     path: automation/allure-results
      #     retention-days: 14

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: automation/allure-report
          retention-days: 14

      # -----------------------
      # Install Allure TestOps CLI
      # -----------------------
      # - name: Install Allure TestOps CLI
      #   run: |
      #     curl -o allurectl https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64
      #     chmod +x allurectl
      #     sudo mv allurectl /usr/local/bin/

      # -----------------------
      # Upload results to Allure TestOps
      # -----------------------
      # - name: Upload to Allure TestOps
      #   if: always()
      #   run: |
      #     allurectl upload \
      #       --endpoint ${{ secrets.ALLURE_ENDPOINT }} \
      #       --token ${{ secrets.ALLURE_TOKEN }} \
      #       --project-id ${{ secrets.ALLURE_PROJECT_ID }} \
      #       automation/allure-results

      # -----------------------
      # PR Comment with links
      # -----------------------
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT }}
          ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
        with:
          script: |
            const runUrl = "https://github.com/" + context.repo.owner + "/" + context.repo.repo + "/actions/runs/" + context.runId;

            const testOpsUrl = process.env.ALLURE_ENDPOINT + "/project/" + process.env.ALLURE_PROJECT_ID + "/launches";

            const body =
              "### 📊 Test Reports\n\n" +
              "**🔹 Allure TestOps (for users with access):**\n" +
              testOpsUrl + "\n\n" +
              "**🔹 Download Reports (for everyone):**\n" +
              runUrl + "\n\n" +
              "---\n" +
              "### 📦 Includes:\n" +
              "- Playwright HTML Report\n" +
              "- Allure HTML Report\n" +
              "- Allure Raw Results\n\n" +
              "👉 Open the workflow run → download artifacts";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
