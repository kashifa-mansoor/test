name: Playwright + Allure + TestOps

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ALLURE_RESULTS: allure-results

    permissions:
      contents: read
      actions: read
      pull-requests: write
      pages: write
      id-token: write

    steps:
      # -----------------------
      # Checkout repos
      # -----------------------
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Checkout automation repo
        uses: actions/checkout@v4
        with:
          repository: kashifa-mansoor/sample-repo
          ref: main
          token: ${{ secrets.SAMPLE_REPO_TOKEN }}
          path: automation

      # -----------------------
      # Setup Node
      # -----------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd automation
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd automation
          npx playwright install chromium

      # -----------------------
      # Setup Allure TestOps
      # -----------------------
      - name: Install and configure allurectl
        uses: allure-framework/setup-allurectl@v1.0.2
        with:
          allure-endpoint: ${{ secrets.ALLURE_ENDPOINT }}
          allure-project-id: ${{ secrets.ALLURE_PROJECT_ID }}
          allure-token: ${{ secrets.ALLURE_TOKEN }}

      # -----------------------
      # Run tests with TestOps tracking
      # -----------------------
      - name: Run tests
        run: |
          cd automation
          allurectl watch -- npx playwright test --project="chromium"

      # -----------------------
      # Capture ALLURE_JOB_RUN_ID
      # -----------------------
      - name: Export Allure Job Run ID
        if: always()
        run: echo "ALLURE_JOB_RUN_ID=$ALLURE_JOB_RUN_ID" >> $GITHUB_ENV

      # -----------------------
      # Install Allure CLI
      # -----------------------
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # -----------------------
      # Generate Allure HTML report
      # -----------------------
      - name: Generate Allure report
        if: always()
        run: |
          cd automation
          npx allure generate $ALLURE_RESULTS --clean -o allure-report

      # -----------------------
      # Upload Artifacts (history)
      # -----------------------
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ github.run_number }}
          path: automation/playwright-report
          retention-days: 14

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: automation/allure-report
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: automation/${{ env.ALLURE_RESULTS }}
          retention-days: 14

      # -----------------------
      # Deploy latest report to GitHub Pages
      # -----------------------
      - name: Prepare Pages content
        if: always()
        run: |
          mkdir site
          cp -r automation/allure-report/* site/

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4

      # -----------------------
      # PR Comment with links
      # -----------------------
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT }}
          ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
          ALLURE_JOB_RUN_ID: ${{ env.ALLURE_JOB_RUN_ID }}
        with:
          script: |
            const runUrl =
              "https://github.com/" +
              context.repo.owner +
              "/" +
              context.repo.repo +
              "/actions/runs/" +
              context.runId;

            const pagesUrl =
              "https://" +
              context.repo.owner +
              ".github.io/" +
              context.repo.repo +
              "/";

            const testOpsUrl =
              process.env.ALLURE_ENDPOINT +
              "/project/" +
              process.env.ALLURE_PROJECT_ID +
              "/launches/job-run/" +
              process.env.ALLURE_JOB_RUN_ID;

            const body =
              "### 📊 Test Reports\n\n" +

              "🔹 **Allure TestOps (Exact Run):**\n" +
              testOpsUrl + "\n\n" +

              "🔹 **Latest Allure Report (GitHub Pages):**\n" +
              pagesUrl + "\n\n" +

              "🔹 **Download Reports (Artifacts):**\n" +
              runUrl + "\n\n" +

              "---\n" +
              "### 📦 Includes:\n" +
              "- Playwright HTML Report\n" +
              "- Allure HTML Report\n" +
              "- Allure Raw Results\n\n" +

              "👉 Use TestOps if you have access, otherwise download artifacts";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
