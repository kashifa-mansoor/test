name: Allure Reports (Pages History)

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      # -----------------------
      # Checkout repos
      # -----------------------
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Checkout automation repo
        uses: actions/checkout@v4
        with:
          repository: kashifa-mansoor/sample-repo
          ref: main
          token: ${{ secrets.SAMPLE_REPO_TOKEN }}
          path: automation

      # -----------------------
      # Setup Node + deps
      # -----------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd automation
          npm ci

      - name: Install Playwright browsers
        run: |
          cd automation
          npx playwright install chromium

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # -----------------------
      # Run tests
      # -----------------------
      - name: Run tests
        run: |
          cd automation
          npx playwright test --project="chromium"

      - name: Generate Allure report
        if: always()
        run: |
          cd automation
          npx allure generate allure-results --clean -o allure-report

      # -----------------------
      # Get existing Pages content
      # -----------------------
      - name: Fetch existing reports from gh-pages
        run: |
          git clone --depth=1 https://github.com/${{ github.repository }}.git gh-pages --branch=gh-pages || true

          mkdir -p site

          if [ -d "gh-pages" ]; then
            cp -r gh-pages/* site/ || true
          fi

      # -----------------------
      # Add current report
      # -----------------------
      - name: Add current report
        run: |
          cp -r automation/allure-report site/run-${{ github.run_number }}

      # -----------------------
      # Keep only last 10 reports
      # -----------------------
      - name: Cleanup old reports
        run: |
          cd site
          ls -dt run-* 2>/dev/null | tail -n +11 | xargs rm -rf || true

      # -----------------------
      # Generate index page
      # -----------------------
      - name: Generate index
        run: |
          echo "<h1>Allure Reports</h1><ul>" > site/index.html
          for d in site/run-*; do
            [ -d "$d" ] || continue
            NAME=$(basename $d)
            echo "<li><a href=\"$NAME/index.html\">$NAME</a></li>" >> site/index.html
          done
          echo "</ul>" >> site/index.html

      # -----------------------
      # Deploy to Pages
      # -----------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # -----------------------
      # PR Comment with link
      # -----------------------
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/run-${context.runNumber}/index.html`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 Allure Report: ${url}`
            });
