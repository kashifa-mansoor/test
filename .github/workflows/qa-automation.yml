name: Run Regression Tests

on:
  pull_request:
  workflow_dispatch:
    # types: [labeled]

jobs:
  run-tests:
    # if: github.event.label.name == 'Ready for Automation'
    runs-on: ubuntu-latest
  # run-tests:
  #   runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Checkout automation repo
        uses: actions/checkout@v4
        with:
          repository: kashifa-mansoor/sample-repo
          ref: main
          token: ${{ secrets.SAMPLE_REPO_TOKEN }}
          path: automation

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd automation
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd automation
          npx playwright install chromium

      - name: Install Allure Commandline
        run: |
          cd automation
          npm install -g allure-commandline --save-dev

      - name: Run Playwright tests
        run: |
          cd automation
          npx playwright test tests/desktop-tests/search-tests/srp-search-tests/common-srp.spec.ts --grep="Location Selection ATV" --retries=0

      - name: Generate Allure report
        if: always()
        run: |
          cd automation
          npx allure generate allure-results --clean -o allure-report

      - name: Prepare report for GitHub Pages
        if: always()
        run: |
          RUN=run-${{ github.run_number }}

          mkdir -p site/$RUN
          cp -r automation/allure-report/* site/$RUN/

          rm -rf site/latest
          cp -r site/$RUN site/latest

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print report links
        run: |
          echo "Latest report:"
          echo ""

          echo "This run report:"
          echo ""
