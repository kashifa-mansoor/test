name: Test Automation

on:
  # Manual trigger
  workflow_dispatch:

  # ONLY when a label is added to PR
  pull_request:
    types: [labeled]

jobs:
  run-test-automation:
    # Run only if the added label is the one we care about
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'test-automation-trigger'
    runs-on: ubuntu-latest

    steps:
    - name: Run automation
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "Triggered manually"
        elif [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "Triggered by label: "${{ github.event.label.name}}"
        fi
