name: Test Automation

on:
  workflow_dispatch:

  pull_request:
    types: [labeled]

jobs:
  run-test-automation:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'test-automation-trigger'
    runs-on: ubuntu-latest

    steps:
      - name: Run automation
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Triggered manually"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Triggered by label: ${{ github.event.label.name }}"
          fi
